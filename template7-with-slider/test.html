<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Theme Switch File Mode</title>
    <style>
      :root {
        --primary: #000;
        --secondary: #555;
        --bg: #fff;
        --text: #000;
      }
      body {
        margin: 0;
        font-family: Arial;
        background: var(--bg);
        color: var(--text);
        transition: 0.3s;
      }
      .container {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
      }
      h1 {
        color: var(--primary);
      }
      p {
        color: var(--secondary);
      }
      .switches {
        position: fixed;
        bottom: 20px;
        display: flex;
        gap: 10px;
      }
      .swatch {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        cursor: pointer;
      }
      .red {
        background: red;
      }
      .green {
        background: green;
      }
      .blue {
        background: blue;
      }
      .pink {
        background: pink;
      }
      .theme-red {
        --primary: #ff0000;
        --secondary: #ff6666;
        --bg: #fff0f0;
        --text: #330000;
      }
      .theme-green {
        --primary: #00a86b;
        --secondary: #66cdaa;
        --bg: #f0fff5;
        --text: #00331a;
      }
      .theme-blue {
        --primary: #007bff;
        --secondary: #66b2ff;
        --bg: #f0f8ff;
        --text: #001933;
      }
      .theme-pink {
        --primary: #ff4da6;
        --secondary: #ff99cc;
        --bg: #fff0f5;
        --text: #33001a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Theme System</h1>
      <p>File mode compatible</p>
    </div>
    <div class="switches">
      <div class="swatch red" data-theme="red"></div>
      <div class="swatch green" data-theme="green"></div>
      <div class="swatch blue" data-theme="blue"></div>
      <div class="swatch pink" data-theme="pink"></div>
    </div>
    <script>
      const swatches = document.querySelectorAll(".swatch");
      const map = { red: "r", green: "g", blue: "b", pink: "p" };
      const reverseMap = { r: "red", g: "green", b: "blue", p: "pink" };
      function applyTheme(theme) {
        document.body.className = "";
        document.body.classList.add("theme-" + theme);
        localStorage.setItem("theme", theme);
        let letter = map[theme];
        let url = new URL(window.location);
        url.searchParams.set("theme", letter);
        history.replaceState(null, "", url);
      }
      swatches.forEach((s) => {
        s.onclick = () => applyTheme(s.dataset.theme);
      });
      function initTheme() {
        let url = new URL(window.location);
        let slug = url.searchParams.get("theme");
        if (reverseMap[slug]) {
          applyTheme(reverseMap[slug]);
        } else {
          let saved = localStorage.getItem("theme");
          if (saved) applyTheme(saved);
        }
      }
      initTheme();
    </script>
  </body>
</html>
