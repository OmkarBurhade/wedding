<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Wedding of Sameer & Mehak</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,600&family=Great+Vibes&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5/dist/fancybox/fancybox.css"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/lity/2.4.1/lity.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

<script>
   tailwind.config = {
    theme: {
    extend: {
      colors: {
        cream: '#f9f5ef',
        ivory: '#faf7f2',
        parch: '#f5f0e8',
        gold: '#c9a96e',
        'gold-d': '#a8854a',
        blush: '#e8c4bc',
        rosedust: '#c9948a',
        sage: '#9baa94',
        dust: '#8b7355',
        warm: '#6b5744',
        muted: '#a89880',
      },

      fontFamily: {
        script: ['"Great Vibes"', 'cursive'],
        serif: ['"Cormorant Garamond"', 'serif'],
        display: ['"Playfair Display"', 'serif'],
        body: ['Lato', 'sans-serif'],
      },
      keyframes: {
        petalFall: {
          '0%': { transform: 'translateY(-15px) rotate(0deg)', opacity: '0' },
          '15%': { opacity: '.85' },
          '100%': { transform: 'translateY(105vh) rotate(400deg)', opacity: '0' }
        },
        floatY: {
          '0%, 100%': { transform: 'translateY(0)' },
          '50%': { transform: 'translateY(-8px)' }
        },
        pulseSoft: {
          '0%, 100%': { transform: 'scale(1)' },
          '50%': { transform: 'scale(1.03)' }
        },
        fadeUp: {
          from: { opacity: '0', transform: 'translateY(20px)' },
          to: { opacity: '1', transform: 'translateY(0)' }
        }
      },
      animation: {
        petalFall: 'petalFall linear infinite',
        floatY: 'floatY 4s ease-in-out infinite',
        pulseSoft: 'pulseSoft 3s ease-in-out infinite',
        fadeUp: 'fadeUp .9s ease forwards',
      },
    }
  }
}
</script>
</head>
<body class="min-h-screen w-full overflow-x-hidden bg-ivory font-body text-black">



<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5/dist/fancybox/fancybox.umd.js"></script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.7/gsap.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lity/2.4.1/lity.min.js"></script>

<script>
  AOS.init();
</script>
<script type="module" src="assets/js/main.js"></script>



  <script>
    const overlay = document.getElementById("inviteOverlay");
    const openInvite = document.getElementById("openInvite");
    const app = document.getElementById("app");
    const music = document.getElementById("music");
    const musicToggle = document.getElementById("musicToggle");
    const attendance = document.getElementById("attendance");
    const sessionFields = document.getElementById("sessionFields");
    const giftSelect = document.getElementById("giftSelect");
    const giftNoteWrap = document.getElementById("giftNoteWrap");
    const videoLink = document.getElementById("videoLink");
    const wishesForm = document.getElementById("wishesForm");
    const wishList = document.getElementById("wishList");

    let playing = false;

    function toggleMusic(forcePlay) {
      const shouldPlay = typeof forcePlay === "boolean" ? forcePlay : !playing;
      if (shouldPlay) {
        music.play().catch(() => {});
        playing = true;
        musicToggle.textContent = "MUSIC ON";
      } else {
        music.pause();
        playing = false;
        musicToggle.textContent = "MUSIC OFF";
      }
    }

    openInvite.addEventListener("click", () => {
      overlay.classList.add("opacity-0", "pointer-events-none");
      app.classList.remove("opacity-0");
      document.body.style.overflow = "";
      musicToggle.classList.remove("hidden");
      toggleMusic(true);
      setTimeout(() => {
        overlay.style.display = "none";
      }, 500);
    });

    document.body.style.overflow = "hidden";

    musicToggle.addEventListener("click", () => toggleMusic());

    attendance.addEventListener("change", () => {
      sessionFields.classList.toggle("hidden", attendance.value !== "1");
    });

    giftSelect.addEventListener("change", () => {
      giftNoteWrap.classList.toggle("hidden", giftSelect.value !== "Transfer");
    });

    videoLink.addEventListener("click", () => {
      music.pause();
      playing = false;
      musicToggle.textContent = "MUSIC OFF";
    });

    const targetDate = new Date("2027-08-27T00:00:00").getTime();
    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    function updateCountdown() {
      const now = Date.now();
      const diff = Math.max(0, targetDate - now);
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);
      daysEl.textContent = days;
      hoursEl.textContent = hours;
      minutesEl.textContent = minutes;
      secondsEl.textContent = seconds;
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    wishesForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const name = document.getElementById("wishName").value.trim();
      const message = document.getElementById("wishText").value.trim();
      if (!name || message.length < 20) {
        return;
      }
      const card = document.createElement("div");
      card.className = "rounded-2xl bg-white/80 p-5 shadow-shell";
      card.innerHTML = '<div class="font-semibold"></div><p class="mt-2 text-sm leading-7"></p>';
      card.querySelector("div").textContent = name;
      card.querySelector("p").textContent = message;
      wishList.prepend(card);
      wishesForm.reset();
    });
  </script>

</body>
</html>
